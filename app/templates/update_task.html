{% extends "base.html" %}

{% block content %}

<div class="update_container">
    <h1>Update Task</h1>
    <form action="{% url 'update_task' task.id %}" method="post">
      {% csrf_token %}
      <label for="title">Title</label>
      <input type="text" id="title" name="title" value="{{ task.title }}">
  
      <label for="description">Description</label>
      <textarea id="description" name="description" required></textarea value="{{ task.description }}" required
  
      <label for="date">Date</label>
      <input type="date" id="date" name="date" value="{{ task.date|date:'Y-m-d' }}">
  
      <label for="complete">Complete</label>
      <input type="checkbox" id="complete" name="complete" {% if task.complete %}checked{% endif %}>
  
      <button type="submit">Update</button>
    </form>
    <li><a href="{% url 'home' %}">Back</a></li>
  </div>
  
{% endblock  %}
