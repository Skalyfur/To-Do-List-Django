{% extends "base.html" %}

{% block content %}

<div class="tasks_container">
    <h1>Tasks List</h1>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Date</th>
          <th>Complete</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for item in task %}
        <tr>
          <td>{{ item.title }}</td>
          <td>{{ item.description }}</td>
          <td>{{ item.date }}</td>
          <td>{{ item.complete }}</td>
          <td>
            <a href="{% url 'delete_task' item.id %}">Delete</a> | 
            <a href="{% url 'update_task' item.id %}">Update</a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5" class="empty_row">There are no tasks available.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <li><a href="{% url 'home' %}">Back</a></li>
  </div>  
{% endblock  %}
